<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>學習主頁</title>
    <link rel="icon" type="image/png" href="assets/images/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="assets/css/theme.css">
    <style>
        * { box-sizing: border-box; }

        body {
            background-color: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
            font-family: 'Fredoka', 'Noto Sans TC', sans-serif;
        }

        .hub-card {
            background-color: var(--surface);
            border: 8px solid var(--border);
            border-radius: 32px;
            box-shadow: 0 15px 35px var(--shadow);
            padding: 60px 80px;
            width: 680px;
            max-width: 100%;
            text-align: center;
        }

        .hub-card h1 {
            font-size: 42px;
            font-weight: 700;
            color: var(--ink);
            margin: 0 0 10px 0;
        }

        .hub-card .subtitle {
            font-size: 17px;
            color: var(--muted);
            margin: 0 0 48px 0;
        }

        .category-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* 大主題按鈕 */
        .category {
            border: 3px solid var(--border);
            border-radius: 24px;
            overflow: hidden;
            background-color: var(--surface);
            box-shadow: 0 4px 12px var(--shadow);
            transition: border-color 0.2s ease;
        }
        .category.open { border-color: var(--primary); }

        .category-head {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 24px 28px;
            cursor: pointer;
            user-select: none;
            color: var(--ink);
            transition: background-color 0.2s ease;
        }
        .category-head:hover { background-color: var(--surface-2); }

        .category-head .cat-icon { font-size: 34px; width: 52px; text-align: center; flex-shrink: 0; }
        .category-head .cat-text { text-align: left; }
        .category-head .cat-title { font-size: 22px; font-weight: 700; margin-bottom: 2px; }
        .category-head .cat-desc { font-size: 14px; color: var(--muted); font-weight: 400; }
        .category-head .cat-chevron {
            margin-left: auto;
            font-size: 18px;
            color: var(--muted-2);
            transition: transform 0.25s ease;
        }
        .category.open .cat-chevron { transform: rotate(180deg); color: var(--primary); }

        /* 展開區 */
        .sub-list {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
            padding: 0 18px;
        }
        .category.open .sub-list { max-height: 600px; }

        .sub-inner { padding: 6px 0 18px 0; display: flex; flex-direction: column; gap: 12px; }

        .page-btn {
            display: flex;
            align-items: center;
            gap: 18px;
            background-color: var(--surface);
            border: 3px solid var(--border);
            border-radius: 18px;
            padding: 16px 22px;
            text-decoration: none;
            color: var(--ink);
            transition: all 0.2s ease;
        }
        .page-btn:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px var(--primary-shadow);
        }
        .page-btn .btn-icon { font-size: 28px; width: 46px; text-align: center; flex-shrink: 0; }
        .page-btn .btn-text { text-align: left; }
        .page-btn .btn-title { font-size: 18px; font-weight: 700; margin-bottom: 2px; }
        .page-btn .btn-desc { font-size: 13px; color: var(--muted); font-weight: 400; }
        .page-btn .btn-arrow { margin-left: auto; font-size: 16px; color: var(--muted-2); }

        /* ---------- 手機版 ---------- */
        @media (max-width: 600px) {
            body { padding: 24px 12px; }
            .hub-card { padding: 32px 20px; border-width: 6px; }
            .hub-card h1 { font-size: 30px; }
            .hub-card .subtitle { font-size: 15px; }
            .category-head { gap: 12px; padding: 18px 16px; }
            .category-head .cat-icon { font-size: 28px; width: 40px; }
            .category-head .cat-title { font-size: 18px; }
            .category-head .cat-desc { font-size: 13px; }
            .category.open .sub-list { max-height: 1200px; }
            .sub-list { padding: 0 12px; }
            .page-btn { gap: 12px; padding: 14px; }
            .page-btn .btn-icon { font-size: 24px; width: 34px; }
            .page-btn .btn-title { font-size: 16px; }
            .page-btn .btn-desc { font-size: 12px; }
        }
    </style>
</head>
<body>

    <div class="hub-card">
        <h1>📚 學習主頁</h1>
        <p class="subtitle">選擇一個主題開始</p>
        <p style="font-size: 14px; color: var(--muted-2); margin: -36px 0 48px 0;">By Anita 老師</p>

        <div class="category-list">

            <!-- 教學內容 -->
            <div class="category">
                <div class="category-head" onclick="toggleCategory(this)">
                    <div class="cat-icon">🎒</div>
                    <div class="cat-text">
                        <div class="cat-title">教學內容</div>
                        <div class="cat-desc">互動課程與闖關遊戲</div>
                    </div>
                    <i class="fa-solid fa-chevron-down cat-chevron"></i>
                </div>
                <div class="sub-list">
                    <div class="sub-inner">
                        <a href="pages/water-acid-base.html" class="page-btn">
                            <div class="btn-icon">🧪</div>
                            <div class="btn-text">
                                <div class="btn-title">水與酸鹼的微觀奧秘</div>
                                <div class="btn-desc">探索離子行為與 pH / pOH 的平衡美學</div>
                            </div>
                            <i class="fa-solid fa-chevron-right btn-arrow"></i>
                        </a>
                        <a href="pages/anti-bullying.html" class="page-btn">
                            <div class="btn-icon">🤝</div>
                            <div class="btn-text">
                                <div class="btn-title">尊重與包容</div>
                                <div class="btn-desc">反霸凌校園教育互動問答</div>
                            </div>
                            <i class="fa-solid fa-chevron-right btn-arrow"></i>
                        </a>
                        <a href="pages/debug.html" class="page-btn">
                            <div class="btn-icon">🍰</div>
                            <div class="btn-text">
                                <div class="btn-title">代碼麵包工廠</div>
                                <div class="btn-desc">Debug 除錯冒險 · 單步執行找出程式的 Bug</div>
                            </div>
                            <i class="fa-solid fa-chevron-right btn-arrow"></i>
                        </a>
                        <a href="pages/math-rpg.html" class="page-btn">
                            <div class="btn-icon">⚔️</div>
                            <div class="btn-text">
                                <div class="btn-title">數學勇者</div>
                                <div class="btn-desc">RPG 闖關問答 · 答對攻擊怪獸，答錯就會受傷</div>
                            </div>
                            <i class="fa-solid fa-chevron-right btn-arrow"></i>
                        </a>
                        <a href="pages/quick-quiz.html" class="page-btn">
                            <div class="btn-icon">⚡</div>
                            <div class="btn-text">
                                <div class="btn-title">快問快答</div>
                                <div class="btn-desc">是非題挑戰 · 可自訂每題秒數，時間到公布答案</div>
                            </div>
                            <i class="fa-solid fa-chevron-right btn-arrow"></i>
                        </a>
                    </div>
                </div>
            </div>

            <!-- 素材 -->
            <div class="category">
                <div class="category-head" onclick="toggleCategory(this)">
                    <div class="cat-icon">📦</div>
                    <div class="cat-text">
                        <div class="cat-title">素材</div>
                        <div class="cat-desc">遊戲素材的下載與上傳</div>
                    </div>
                    <i class="fa-solid fa-chevron-down cat-chevron"></i>
                </div>
                <div class="sub-list">
                    <div class="sub-inner">
                        <a href="pages/downloads.html" class="page-btn">
                            <div class="btn-icon">📥</div>
                            <div class="btn-text">
                                <div class="btn-title">素材下載</div>
                                <div class="btn-desc">下載遊戲素材與教學檔案</div>
                            </div>
                            <i class="fa-solid fa-chevron-right btn-arrow"></i>
                        </a>
                        <a href="pages/upload.html" class="page-btn">
                            <div class="btn-icon">📤</div>
                            <div class="btn-text">
                                <div class="btn-title">上傳素材</div>
                                <div class="btn-desc">老師專用 · 需要 GitHub 權杖</div>
                            </div>
                            <i class="fa-solid fa-chevron-right btn-arrow"></i>
                        </a>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <p id="version-label" style="margin-top: 18px; font-size: 13px; color: var(--muted-2);"></p>

    <script>
        function toggleCategory(head) {
            const cat = head.parentElement;
            const isOpen = cat.classList.contains('open');
            document.querySelectorAll('.category').forEach(c => c.classList.remove('open'));
            if (!isOpen) cat.classList.add('open');
        }

        fetch('config.json')
            .then(r => r.json())
            .then(cfg => {
                document.getElementById('version-label').textContent = `v${cfg.version} · ${cfg.lastUpdated}`;
            });
    </script>

    <script src="assets/js/theme.js"></script>
</body>
</html>
