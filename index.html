<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>學習主頁</title>
    <link rel="icon" type="image/png" href="assets/images/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { box-sizing: border-box; }

        body {
            background-color: #f0e6df;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Fredoka', 'Noto Sans TC', sans-serif;
        }

        .hub-card {
            background-color: #fffdf9;
            border: 8px solid #fcf0db;
            border-radius: 32px;
            box-shadow: 0 15px 35px rgba(139, 92, 26, 0.1);
            padding: 60px 80px;
            width: 680px;
            text-align: center;
        }

        .hub-card h1 {
            font-size: 42px;
            font-weight: 700;
            color: #4a3e3d;
            margin: 0 0 10px 0;
        }

        .hub-card .subtitle {
            font-size: 17px;
            color: #9e8e8b;
            margin: 0 0 48px 0;
        }

        .page-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .page-btn {
            display: flex;
            align-items: center;
            gap: 20px;
            background-color: #ffffff;
            border: 3px solid #fcf0db;
            border-radius: 20px;
            padding: 20px 28px;
            text-decoration: none;
            color: #4a3e3d;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(139, 92, 26, 0.05);
        }

        .page-btn:hover {
            border-color: #4fc3f7;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(79, 195, 247, 0.15);
        }

        .page-btn .btn-icon {
            font-size: 32px;
            width: 52px;
            text-align: center;
            flex-shrink: 0;
        }

        .page-btn .btn-text {
            text-align: left;
        }

        .page-btn .btn-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 2px;
        }

        .page-btn .btn-desc {
            font-size: 14px;
            color: #9e8e8b;
            font-weight: 400;
        }

        .page-btn .btn-arrow {
            margin-left: auto;
            font-size: 18px;
            color: #c8b8b5;
        }
    </style>
</head>
<body>

    <div class="hub-card">
        <h1>📚 學習主頁</h1>
        <p class="subtitle">選擇一個主題開始學習</p>
        <p style="font-size: 14px; color: #c8b8b5; margin: -36px 0 48px 0;">By Anita 老師</p>

        <div class="page-list">
            <a href="pages/water-acid-base.html" class="page-btn">
                <div class="btn-icon">🧪</div>
                <div class="btn-text">
                    <div class="btn-title">水與酸鹼的微觀奧秘</div>
                    <div class="btn-desc">探索離子行為與 pH / pOH 的平衡美學</div>
                </div>
                <i class="fa-solid fa-chevron-right btn-arrow"></i>
            </a>
            <a href="pages/anti-bullying.html" class="page-btn">
                <div class="btn-icon">🤝</div>
                <div class="btn-text">
                    <div class="btn-title">尊重與包容</div>
                    <div class="btn-desc">反霸凌校園教育互動問答</div>
                </div>
                <i class="fa-solid fa-chevron-right btn-arrow"></i>
            </a>
        </div>
    </div>

    <p id="version-label" style="margin-top: 18px; font-size: 13px; color: #c8b8b5;"></p>

    <script>
        fetch('config.json')
            .then(r => r.json())
            .then(cfg => {
                document.getElementById('version-label').textContent = `v${cfg.version} · ${cfg.lastUpdated}`;
            });
    </script>

</body>
</html>
