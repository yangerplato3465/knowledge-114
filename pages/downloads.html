<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>素材下載 · 學習主頁</title>
    <link rel="icon" type="image/png" href="../assets/images/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { box-sizing: border-box; }

        body {
            background-color: #f0e6df;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 48px 20px;
            font-family: 'Fredoka', 'Noto Sans TC', sans-serif;
            color: #4a3e3d;
        }

        .card {
            background-color: #fffdf9;
            border: 8px solid #fcf0db;
            border-radius: 32px;
            box-shadow: 0 15px 35px rgba(139, 92, 26, 0.1);
            padding: 48px 56px;
            width: 640px;
            max-width: 100%;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: #9e8e8b;
            font-size: 15px;
            margin-bottom: 22px;
        }
        .back-link:hover { color: #4fc3f7; }

        .top { display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap; }
        h1 { font-size: 32px; font-weight: 700; margin: 0 0 6px 0; }
        .subtitle { font-size: 15px; color: #9e8e8b; margin: 0 0 28px 0; }

        .file-list { display: flex; flex-direction: column; gap: 12px; }

        .file-row {
            display: flex;
            align-items: center;
            gap: 18px;
            background-color: #ffffff;
            border: 3px solid #fcf0db;
            border-radius: 18px;
            padding: 16px 22px;
            transition: all 0.2s ease;
        }
        .file-row:hover { border-color: #4fc3f7; transform: translateY(-2px); box-shadow: 0 8px 18px rgba(79, 195, 247, 0.12); }

        .file-icon { font-size: 26px; width: 40px; text-align: center; flex-shrink: 0; color: #4db6ac; }
        .file-info { min-width: 0; }
        .file-name { font-size: 16px; font-weight: 500; word-break: break-all; }
        .file-size { font-size: 13px; color: #c8b8b5; }

        .dl-btn {
            margin-left: auto;
            flex-shrink: 0;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 700;
            color: #fff;
            background: linear-gradient(135deg, #4fc3f7 0%, #4db6ac 100%);
            border-radius: 14px;
            padding: 10px 18px;
            box-shadow: 0 4px 12px rgba(79, 195, 247, 0.2);
            transition: transform 0.15s ease;
        }
        .dl-btn:hover { transform: translateY(-1px); }

        .state { text-align: center; color: #9e8e8b; padding: 40px 10px; font-size: 15px; }
        .state i { font-size: 30px; display: block; margin-bottom: 14px; color: #d8c4b8; }
        .state.err i { color: #e57373; }
    </style>
</head>
<body>
    <div class="card">
        <a href="../index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> 回學習主頁</a>
        <div class="top">
            <h1>📥 素材下載</h1>
        </div>
        <p class="subtitle">點右側按鈕即可下載遊戲素材。</p>

        <div id="list" class="file-list">
            <div class="state"><i class="fa-solid fa-spinner fa-spin"></i>載入中…</div>
        </div>
    </div>

    <script>
        const OWNER  = 'yangerplato3465';
        const REPO   = 'knowledge-114';
        const BRANCH = 'main';
        const DIR    = 'assets/uploads';
        const API    = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${DIR}?ref=${BRANCH}`;

        const list = document.getElementById('list');

        function iconFor(name) {
            const ext = name.split('.').pop().toLowerCase();
            if (['png','jpg','jpeg','gif','webp','svg','bmp'].includes(ext)) return 'fa-file-image';
            if (['mp3','wav','ogg','m4a','flac'].includes(ext)) return 'fa-file-audio';
            if (['mp4','webm','mov','avi'].includes(ext)) return 'fa-file-video';
            if (['json','js','html','css','txt','csv','xml'].includes(ext)) return 'fa-file-code';
            if (['zip','rar','7z','tar','gz'].includes(ext)) return 'fa-file-zipper';
            return 'fa-file';
        }

        function fmtSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / 1024 / 1024).toFixed(1) + ' MB';
        }

        function showState(cls, icon, text) {
            list.innerHTML = `<div class="state ${cls}"><i class="fa-solid ${icon}"></i>${text}</div>`;
        }

        async function load() {
            let res;
            try {
                res = await fetch(API, { headers: { 'Accept': 'application/vnd.github+json' } });
            } catch (e) {
                return showState('err', 'fa-triangle-exclamation', '無法連線，請稍後再試。');
            }

            if (res.status === 404) return showState('', 'fa-box-open', '素材庫還是空的，快去上傳第一個檔案吧！');
            if (!res.ok) return showState('err', 'fa-triangle-exclamation', `載入失敗（HTTP ${res.status}）`);

            let items = await res.json();
            items = items
                .filter(f => f.type === 'file' && f.name !== '.gitkeep')
                .sort((a, b) => a.name.localeCompare(b.name, 'zh-Hant'));

            if (!items.length) return showState('', 'fa-box-open', '素材庫還是空的，快去上傳第一個檔案吧！');

            list.innerHTML = '';
            for (const f of items) {
                const row = document.createElement('div');
                row.className = 'file-row';
                row.innerHTML = `
                    <i class="fa-solid ${iconFor(f.name)} file-icon"></i>
                    <div class="file-info">
                        <div class="file-name">${f.name}</div>
                        <div class="file-size">${fmtSize(f.size)}</div>
                    </div>
                    <a class="dl-btn" href="${f.download_url}" download="${f.name}">
                        <i class="fa-solid fa-download"></i> 下載
                    </a>`;
                list.appendChild(row);
            }
        }

        load();
    </script>
</body>
</html>
