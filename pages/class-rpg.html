<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>班級 RPG · 學習主頁</title>
    <link rel="icon" type="image/png" href="../assets/images/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/theme.css">
    <style>
        * { box-sizing: border-box; }
        body {
            background-color: var(--bg);
            margin: 0;
            padding: 32px 16px 80px;
            font-family: 'Fredoka', 'Noto Sans TC', sans-serif;
            color: var(--ink);
        }
        .wrap { max-width: 920px; margin: 0 auto; }

        .back-link {
            display: inline-flex; align-items: center; gap: 8px;
            color: var(--muted); text-decoration: none; font-size: 15px;
            margin-bottom: 18px;
        }
        .back-link:hover { color: var(--primary); }

        h1 { font-size: 34px; font-weight: 700; margin: 0 0 4px; }
        .subtitle { color: var(--muted); margin: 0 0 28px; font-size: 15px; }

        .card {
            background: var(--surface);
            border: 3px solid var(--border);
            border-radius: 22px;
            box-shadow: 0 8px 22px var(--shadow);
            padding: 24px;
            margin-bottom: 22px;
        }
        .card h2 {
            font-size: 19px; margin: 0 0 16px;
            display: flex; align-items: center; gap: 10px;
        }

        label { display: block; font-size: 13px; color: var(--muted); margin: 0 0 6px; font-weight: 500; }
        input, select {
            width: 100%;
            font-family: inherit; font-size: 15px;
            padding: 11px 14px;
            border: 2px solid var(--border);
            border-radius: 12px;
            background: var(--surface-2);
            color: var(--ink);
            outline: none;
            transition: border-color 0.15s ease;
        }
        input:focus, select:focus { border-color: var(--primary); }

        .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; }
        .row > div { flex: 1; min-width: 130px; }

        .btn {
            font-family: inherit; font-size: 15px; font-weight: 600;
            padding: 11px 20px; border: none; border-radius: 12px;
            background: var(--grad); color: var(--on-primary);
            cursor: pointer; white-space: nowrap;
            transition: transform 0.12s ease, box-shadow 0.2s ease;
        }
        .btn:hover { transform: translateY(-1px); box-shadow: 0 6px 16px var(--primary-shadow); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
        .btn-ghost {
            background: var(--surface-2); color: var(--ink);
            border: 2px solid var(--border);
        }
        .btn-ghost:hover { border-color: var(--primary); box-shadow: none; }
        .btn-sm { padding: 6px 12px; font-size: 13px; border-radius: 10px; }
        .btn-danger { background: var(--bad-bg); color: var(--bad); border: 2px solid var(--bad-border); }
        .btn-danger:hover { box-shadow: none; }

        .class-bar { display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; }
        .class-bar > div:first-child { flex: 1; min-width: 200px; }

        /* 學生卡 */
        .students { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }
        .student {
            background: var(--surface-2);
            border: 2px solid var(--border);
            border-radius: 16px;
            padding: 16px;
        }
        .student-top { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
        .avatar {
            width: 42px; height: 42px; border-radius: 12px; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; background: var(--primary-tint);
        }
        .student-name { font-size: 17px; font-weight: 700; line-height: 1.2; }
        .student-lv { font-size: 12px; color: var(--muted); }
        .stats { display: flex; flex-direction: column; gap: 7px; font-size: 14px; }
        .stat { display: flex; align-items: center; gap: 8px; }
        .stat .k { color: var(--muted); width: 58px; flex-shrink: 0; }
        .stat .v { font-weight: 600; }
        .adj { margin-left: auto; display: flex; gap: 4px; }
        .adj button {
            width: 26px; height: 26px; border-radius: 8px; border: 1px solid var(--border);
            background: var(--surface); color: var(--ink); cursor: pointer; font-size: 14px;
            display: flex; align-items: center; justify-content: center; padding: 0;
        }
        .adj button:hover { border-color: var(--primary); color: var(--primary); }
        .student-actions { display: flex; gap: 8px; margin-top: 14px; }

        .state { text-align: center; color: var(--muted); padding: 40px 10px; font-size: 15px; }

        .toast {
            position: fixed; left: 50%; bottom: 26px; transform: translateX(-50%) translateY(20px);
            background: var(--ink); color: var(--surface);
            padding: 11px 22px; border-radius: 999px; font-size: 14px;
            opacity: 0; pointer-events: none; transition: all 0.25s ease; z-index: 9999;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* 登入畫面 */
        #app { display: none; }
        .login-screen {
            min-height: 70vh; display: flex; align-items: center; justify-content: center;
        }
        .login-card {
            background: var(--surface); border: 3px solid var(--border);
            border-radius: 22px; box-shadow: 0 10px 30px var(--shadow);
            padding: 34px 30px; width: 380px; max-width: 100%; text-align: center;
        }
        .login-card .lock { font-size: 44px; margin-bottom: 6px; }
        .login-card h2 { font-size: 22px; margin: 0 0 4px; justify-content: center; }
        .login-card p.hint { color: var(--muted); font-size: 13px; margin: 0 0 22px; }
        .login-card label { text-align: left; }
        .login-card .field { margin-bottom: 14px; text-align: left; }
        .login-card .btn { width: 100%; margin-top: 6px; }
        .login-err { color: var(--bad); font-size: 13px; min-height: 18px; margin-top: 10px; }

        /* 頂部老師列 */
        .auth-bar {
            display: flex; align-items: center; gap: 10px;
            background: var(--surface); border: 2px solid var(--border);
            border-radius: 14px; padding: 10px 16px; margin-bottom: 20px;
            font-size: 14px; color: var(--ink);
        }
        .auth-bar .who { color: var(--muted); }
        .auth-bar .who b { color: var(--ink); }
        .auth-bar #editNameBtn { margin-left: auto; }

        @media (max-width: 600px) {
            h1 { font-size: 27px; }
            .card { padding: 18px; }
            .login-card { padding: 26px 20px; }
        }
    </style>
</head>
<body>
    <div class="wrap">
        <a href="../index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> 回學習主頁</a>
        <h1>⚔️ 班級 RPG</h1>
        <p class="subtitle">建立班級、新增學生角色，資料即時儲存到雲端。老師專用。</p>

        <!-- 登入畫面（未登入時顯示） -->
        <div id="loginScreen" class="login-screen" style="display:none">
            <div class="login-card">
                <div class="lock">🔐</div>
                <h2>老師登入</h2>
                <p class="hint">請使用管理員配發的帳號登入</p>
                <div class="field">
                    <label>電子郵件</label>
                    <input id="loginEmail" type="email" autocomplete="username" placeholder="teacher@example.com">
                </div>
                <div class="field">
                    <label>密碼</label>
                    <input id="loginPassword" type="password" autocomplete="current-password" placeholder="••••••••">
                </div>
                <button class="btn" id="loginBtn">登入</button>
                <div class="login-err" id="loginErr"></div>
            </div>
        </div>

        <!-- 主應用（登入後顯示） -->
        <div id="app">

        <div class="auth-bar">
            <span class="who">登入為 <b id="whoEmail">—</b></span>
            <button class="btn btn-ghost btn-sm" id="editNameBtn" title="設定顯示名稱"><i class="fa-solid fa-pen"></i> 改名稱</button>
            <button class="btn btn-ghost btn-sm logout" id="logoutBtn"><i class="fa-solid fa-right-from-bracket"></i> 登出</button>
        </div>

        <!-- 班級選擇 / 建立 -->
        <div class="card">
            <h2>🏫 選擇班級</h2>
            <div class="class-bar">
                <div>
                    <label>目前班級</label>
                    <select id="classSelect"><option value="">載入中…</option></select>
                </div>
                <button class="btn btn-ghost" id="newClassBtn"><i class="fa-solid fa-plus"></i> 建立新班級</button>
                <button class="btn-danger btn btn-sm" id="delClassBtn" style="align-self:stretch">刪除此班級</button>
            </div>
        </div>

        <!-- 新增學生 -->
        <div class="card" id="addCard">
            <h2>🧙 新增學生角色</h2>
            <div class="row" style="margin-bottom:12px">
                <div>
                    <label>姓名 *</label>
                    <input id="f_name" placeholder="例：小明">
                </div>
                <div>
                    <label>性別</label>
                    <select id="f_gender">
                        <option value="男">男</option>
                        <option value="女">女</option>
                        <option value="其他">其他</option>
                    </select>
                </div>
                <div>
                    <label>等級</label>
                    <input id="f_level" type="number" value="1" min="1">
                </div>
            </div>
            <div class="row" style="margin-bottom:12px">
                <div>
                    <label>經驗值</label>
                    <input id="f_exp" type="number" value="0" min="0">
                </div>
                <div>
                    <label>金幣</label>
                    <input id="f_gold" type="number" value="0" min="0">
                </div>
            </div>
            <div class="row" style="margin-bottom:16px">
                <div>
                    <label>武器</label>
                    <input id="f_weapon" placeholder="例：木劍">
                </div>
                <div>
                    <label>裝備</label>
                    <input id="f_equipment" placeholder="例：布衣、皮靴">
                </div>
            </div>
            <button class="btn" id="addStudentBtn"><i class="fa-solid fa-user-plus"></i> 新增學生</button>
        </div>

        <!-- 學生列表 -->
        <div class="card">
            <h2>📋 學生名冊 <span id="countBadge" style="font-size:14px;color:var(--muted);font-weight:400"></span></h2>
            <div id="studentList" class="students"></div>
            <div id="studentEmpty" class="state">尚未選擇班級。</div>
        </div>

        </div><!-- /#app -->
    </div>

    <div id="toast" class="toast"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import {
            getFirestore, collection, doc, addDoc, setDoc, getDocs,
            deleteDoc, updateDoc, onSnapshot, query, where, orderBy, serverTimestamp
        } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";
        import {
            getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged, updateProfile
        } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBW7V3sXHn8MsaP4KFmHDOHUFXSz3ksRDM",
            authDomain: "classroom-rpg-a931a.firebaseapp.com",
            projectId: "classroom-rpg-a931a",
            storageBucket: "classroom-rpg-a931a.firebasestorage.app",
            messagingSenderId: "548698002427",
            appId: "1:548698002427:web:896b85619015fc9303315e",
            measurementId: "G-9R7TMK6B7T"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // ---- DOM ----
        const $ = id => document.getElementById(id);
        const classSelect = $('classSelect');
        const studentList = $('studentList');
        const studentEmpty = $('studentEmpty');
        const countBadge = $('countBadge');

        let currentClassId = null;
        let unsubStudents = null;
        let currentUser = null;

        function toast(msg) {
            const t = $('toast');
            t.textContent = msg;
            t.classList.add('show');
            clearTimeout(t._t);
            t._t = setTimeout(() => t.classList.remove('show'), 2200);
        }

        const genderEmoji = g => g === '女' ? '🧝‍♀️' : g === '男' ? '🧙‍♂️' : '🧚';
        const num = v => { const n = Number(v); return Number.isFinite(n) ? n : 0; };

        // ---- 班級 ----
        async function loadClasses(selectId) {
            if (!currentUser) return;
            // 只讀取屬於這位老師的班級（用戶端排序，免建複合索引）
            const snap = await getDocs(
                query(collection(db, 'classes'), where('ownerId', '==', currentUser.uid))
            );
            const classes = [];
            snap.forEach(d => classes.push({ id: d.id, ...d.data() }));
            classes.sort((a, b) => (a.createdAt?.seconds || 0) - (b.createdAt?.seconds || 0));

            if (classes.length === 0) {
                classSelect.innerHTML = '<option value="">尚無班級，請先建立</option>';
                currentClassId = null;
                watchStudents(null);
                return;
            }
            classSelect.innerHTML = classes
                .map(c => `<option value="${c.id}">${escapeHtml(c.name)}</option>`)
                .join('');
            const pick = selectId && classes.some(c => c.id === selectId)
                ? selectId : classes[0].id;
            classSelect.value = pick;
            selectClass(pick);
        }

        async function createClass() {
            const name = prompt('輸入班級名稱：', '');
            if (name === null) return;
            const trimmed = name.trim();
            if (!trimmed) { toast('班級名稱不可空白'); return; }
            const ref = await addDoc(collection(db, 'classes'), {
                name: trimmed,
                ownerId: currentUser.uid,
                createdAt: serverTimestamp()
            });
            toast('已建立班級：' + trimmed);
            await loadClasses(ref.id);
        }

        async function deleteCurrentClass() {
            if (!currentClassId) { toast('尚未選擇班級'); return; }
            const name = classSelect.options[classSelect.selectedIndex]?.text || '';
            if (!confirm(`確定刪除班級「${name}」？此班級所有學生資料也會一併刪除，無法復原。`)) return;
            // 先刪學生子集合
            const studentsSnap = await getDocs(collection(db, 'classes', currentClassId, 'students'));
            await Promise.all(studentsSnap.docs.map(d => deleteDoc(d.ref)));
            await deleteDoc(doc(db, 'classes', currentClassId));
            toast('已刪除班級');
            await loadClasses();
        }

        function selectClass(id) {
            currentClassId = id;
            watchStudents(id);
        }

        // ---- 學生 ----
        function watchStudents(classId) {
            if (unsubStudents) { unsubStudents(); unsubStudents = null; }
            if (!classId) {
                studentList.innerHTML = '';
                studentEmpty.style.display = 'block';
                studentEmpty.textContent = '尚無班級，請先建立班級。';
                countBadge.textContent = '';
                return;
            }
            const col = collection(db, 'classes', classId, 'students');
            unsubStudents = onSnapshot(query(col, orderBy('name', 'asc')), snap => {
                const students = [];
                snap.forEach(d => students.push({ id: d.id, ...d.data() }));
                renderStudents(students);
            }, err => {
                console.error(err);
                studentEmpty.style.display = 'block';
                studentEmpty.textContent = '載入失敗：' + err.message;
            });
        }

        function renderStudents(students) {
            countBadge.textContent = students.length ? `（${students.length} 人）` : '';
            if (!students.length) {
                studentList.innerHTML = '';
                studentEmpty.style.display = 'block';
                studentEmpty.textContent = '這個班級還沒有學生，用上方表單新增吧！';
                return;
            }
            studentEmpty.style.display = 'none';
            studentList.innerHTML = students.map(s => {
                const name = escapeHtml(s.name || '');
                return `
                <div class="student" data-id="${s.id}">
                    <div class="student-top">
                        <div class="avatar">${genderEmoji(s.gender)}</div>
                        <div>
                            <div class="student-name">${name}</div>
                            <div class="student-lv">Lv.${num(s.level)} · ${escapeHtml(s.gender || '—')}</div>
                        </div>
                    </div>
                    <div class="stats">
                        <div class="stat"><span class="k">⭐ 經驗</span><span class="v">${num(s.exp)}</span>
                            <span class="adj"><button data-act="exp" data-d="-10">−</button><button data-act="exp" data-d="10">＋</button></span></div>
                        <div class="stat"><span class="k">🪙 金幣</span><span class="v">${num(s.gold)}</span>
                            <span class="adj"><button data-act="gold" data-d="-5">−</button><button data-act="gold" data-d="5">＋</button></span></div>
                        <div class="stat"><span class="k">🗡️ 武器</span><span class="v">${escapeHtml(s.weapon || '—')}</span></div>
                        <div class="stat"><span class="k">🛡️ 裝備</span><span class="v">${escapeHtml(s.equipment || '—')}</span></div>
                    </div>
                    <div class="student-actions">
                        <button class="btn btn-ghost btn-sm" data-act="edit">編輯</button>
                        <button class="btn-danger btn btn-sm" data-act="del">刪除</button>
                    </div>
                </div>`;
            }).join('');
        }

        // 事件委派：加減 / 編輯 / 刪除
        studentList.addEventListener('click', async e => {
            const btn = e.target.closest('button');
            if (!btn) return;
            const card = e.target.closest('.student');
            const sid = card?.dataset.id;
            if (!sid || !currentClassId) return;
            const ref = doc(db, 'classes', currentClassId, 'students', sid);
            const act = btn.dataset.act;

            if (act === 'exp' || act === 'gold') {
                const cur = num(card.querySelector(`[data-act="${act}"]`).closest('.stat').querySelector('.v').textContent);
                const next = Math.max(0, cur + Number(btn.dataset.d));
                await updateDoc(ref, { [act]: next });
            } else if (act === 'del') {
                const nm = card.querySelector('.student-name').textContent;
                if (confirm(`確定刪除學生「${nm}」？`)) { await deleteDoc(ref); toast('已刪除'); }
            } else if (act === 'edit') {
                openEdit(sid, card);
            }
        });

        async function openEdit(sid, card) {
            const nm = card.querySelector('.student-name').textContent;
            const level = prompt(`「${nm}」的等級：`, num(card.querySelector('.student-lv').textContent.match(/Lv\.(\d+)/)?.[1]));
            if (level === null) return;
            const weapon = prompt('武器：', card.querySelectorAll('.stat .v')[2].textContent.replace('—',''));
            if (weapon === null) return;
            const equipment = prompt('裝備：', card.querySelectorAll('.stat .v')[3].textContent.replace('—',''));
            if (equipment === null) return;
            await updateDoc(doc(db, 'classes', currentClassId, 'students', sid), {
                level: num(level), weapon: weapon.trim(), equipment: equipment.trim()
            });
            toast('已更新');
        }

        async function addStudent() {
            if (!currentClassId) { toast('請先建立或選擇班級'); return; }
            const name = $('f_name').value.trim();
            if (!name) { toast('請輸入姓名'); $('f_name').focus(); return; }
            const data = {
                name,
                gender: $('f_gender').value,
                level: num($('f_level').value) || 1,
                exp: num($('f_exp').value),
                gold: num($('f_gold').value),
                weapon: $('f_weapon').value.trim(),
                equipment: $('f_equipment').value.trim(),
                createdAt: serverTimestamp()
            };
            await addDoc(collection(db, 'classes', currentClassId, 'students'), data);
            toast('已新增：' + name);
            // 清空表單（保留性別/等級預設）
            ['f_name','f_weapon','f_equipment'].forEach(id => $(id).value = '');
            $('f_exp').value = 0; $('f_gold').value = 0; $('f_level').value = 1;
            $('f_name').focus();
        }

        function escapeHtml(s) {
            return String(s).replace(/[&<>"']/g, c => (
                { '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]
            ));
        }

        // ---- 登入 / 登出 ----
        function authErrMsg(code) {
            const m = {
                'auth/invalid-email': '電子郵件格式不正確',
                'auth/invalid-credential': '帳號或密碼錯誤',
                'auth/wrong-password': '帳號或密碼錯誤',
                'auth/user-not-found': '帳號或密碼錯誤',
                'auth/too-many-requests': '嘗試次數過多，請稍後再試',
                'auth/user-disabled': '此帳號已被停用'
            };
            return m[code] || ('登入失敗：' + code);
        }

        async function doLogin() {
            const email = $('loginEmail').value.trim();
            const pw = $('loginPassword').value;
            const errEl = $('loginErr');
            errEl.textContent = '';
            if (!email || !pw) { errEl.textContent = '請輸入電子郵件與密碼'; return; }
            $('loginBtn').disabled = true;
            try {
                await signInWithEmailAndPassword(auth, email, pw);
                // onAuthStateChanged 會接手切換畫面
            } catch (err) {
                errEl.textContent = authErrMsg(err.code || err.message);
            } finally {
                $('loginBtn').disabled = false;
            }
        }

        onAuthStateChanged(auth, user => {
            currentUser = user;
            if (user) {
                $('loginScreen').style.display = 'none';
                $('app').style.display = 'block';
                $('whoEmail').textContent = user.displayName || user.email || user.uid;
                $('loginPassword').value = '';
                loadClasses().catch(err => {
                    console.error(err);
                    toast('讀取班級失敗：' + err.message);
                    classSelect.innerHTML = '<option value="">讀取失敗</option>';
                });
            } else {
                // 未登入：清空並顯示登入畫面
                if (unsubStudents) { unsubStudents(); unsubStudents = null; }
                currentClassId = null;
                $('app').style.display = 'none';
                $('loginScreen').style.display = 'flex';
            }
        });

        // ---- 綁定 ----
        classSelect.addEventListener('change', e => selectClass(e.target.value));
        $('newClassBtn').addEventListener('click', createClass);
        $('delClassBtn').addEventListener('click', deleteCurrentClass);
        $('addStudentBtn').addEventListener('click', addStudent);
        $('f_name').addEventListener('keydown', e => { if (e.key === 'Enter') addStudent(); });
        $('loginBtn').addEventListener('click', doLogin);
        $('loginPassword').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
        $('loginEmail').addEventListener('keydown', e => { if (e.key === 'Enter') $('loginPassword').focus(); });
        $('logoutBtn').addEventListener('click', () => signOut(auth));
        $('editNameBtn').addEventListener('click', async () => {
            if (!currentUser) return;
            const name = prompt('設定你的顯示名稱（例如：Gorgeous Tr.Anita）：', currentUser.displayName || '');
            if (name === null) return;
            const trimmed = name.trim();
            try {
                await updateProfile(currentUser, { displayName: trimmed });
                $('whoEmail').textContent = trimmed || currentUser.email || currentUser.uid;
                toast(trimmed ? '已更新名稱' : '已清除名稱');
            } catch (err) {
                toast('更新失敗：' + err.message);
            }
        });
    </script>
    <script src="../assets/js/theme.js"></script>
</body>
</html>
