<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>代碼麵包工廠 · Debug 除錯大冒險</title>
    <link rel="icon" type="image/png" href="../assets/images/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/theme.css">
    <style>
        * { box-sizing: border-box; }

        /* 本頁主題色：浅葱色（偏青的天藍，不帶綠） */
        body { --g1: #2f93c4; --g2: #7cc0dd; --g-bg: #e9f5fb; --g-line: #c3e4f1; }
        :root[data-theme="dark"] body { --g-bg: #16283a; --g-line: #29506a; }
        @media (prefers-color-scheme: dark) { :root:not([data-theme="light"]) body { --g-bg: #16283a; --g-line: #29506a; } }

        body {
            background-color: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
            font-family: 'Fredoka', 'Noto Sans TC', sans-serif;
        }

        .debug-card {
            background-color: var(--surface);
            border: 8px solid var(--border);
            border-radius: 32px;
            box-shadow: 0 15px 35px var(--shadow);
            width: 1120px;
            max-width: 100%;
            overflow: hidden;
        }

        /* ---------- 頂部標題 ---------- */
        .debug-header {
            background: linear-gradient(135deg, var(--g2) 0%, var(--g1) 100%);
            color: #ffffff;
            text-align: center;
            padding: 36px 40px 30px;
        }
        .debug-header .header-icon { font-size: 50px; margin-bottom: 8px; }
        .debug-header h1 { font-size: 36px; font-weight: 700; margin: 0; text-shadow: 1px 2px 0 rgba(0,0,0,0.08); }
        .debug-header p { font-size: 17px; margin: 8px 0 0; opacity: 0.96; font-weight: 400; line-height: 1.5; }
        .debug-header b { font-weight: 700; text-decoration: underline; }

        /* ---------- 任務說明條 ---------- */
        .mission-bar {
            display: flex; align-items: center; gap: 14px;
            background-color: var(--g-bg);
            border-bottom: 3px solid var(--border);
            padding: 16px 40px;
            font-size: 15px; color: var(--ink-soft); line-height: 1.55;
        }
        .mission-bar .level-badge {
            flex-shrink: 0;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: #fff; font-weight: 700; font-size: 15px;
            padding: 10px 16px; border-radius: 16px;
            white-space: nowrap; text-align: center; line-height: 1.35;
        }
        .mission-bar .goal-tag {
            display: inline-block; background: var(--g-line); color: var(--g1);
            font-weight: 700; font-size: 13px; padding: 2px 10px; border-radius: 999px;
            margin-right: 8px;
        }
        .mission-bar b { color: var(--g1); }

        /* ---------- 三欄主體 ---------- */
        .workspace {
            display: grid;
            grid-template-columns: 330px 1fr 380px;
            gap: 20px;
            padding: 24px 30px 32px;
        }
        .panel {
            background-color: var(--surface);
            border: 3px solid var(--border);
            border-radius: 24px;
            padding: 20px;
            display: flex; flex-direction: column;
        }
        .panel-title {
            font-size: 17px; font-weight: 700; color: var(--ink);
            margin: 0 0 6px; display: flex; align-items: center; gap: 8px;
        }
        .panel-hint { font-size: 13px; color: var(--muted); margin: 0 0 16px; line-height: 1.5; }

        /* ---------- 左：積木指令區 ---------- */
        .block-list { display: flex; flex-direction: column; gap: 12px; }

        .block {
            display: flex; align-items: center; gap: 10px;
            background: linear-gradient(135deg, var(--g-bg), var(--g-line));
            border: 3px solid var(--g-line);
            border-radius: 16px;
            padding: 12px 14px;
            transition: transform 0.12s ease, box-shadow 0.12s ease, border-color 0.2s ease, opacity 0.2s ease;
            box-shadow: 0 3px 0 var(--g-line);
            user-select: none;
        }
        .block.draggable { cursor: grab; }
        .block.draggable:active { cursor: grabbing; }
        .block.dragging { opacity: 0.4; }
        .block.drag-over { transform: translateY(2px); border-color: var(--primary); }

        .block .grip { color: var(--g2); font-size: 15px; }
        .block .b-num {
            width: 26px; height: 26px; flex-shrink: 0;
            background-color: var(--g1); color: #fff; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 14px;
        }
        .block .b-icon { font-size: 24px; }
        .block .b-label { font-size: 16px; font-weight: 600; color: var(--ink-soft); flex: 1; }

        .block .b-moves { display: flex; flex-direction: column; gap: 2px; }
        .block .b-moves button {
            border: none; background: var(--g-bg); color: var(--g1);
            width: 22px; height: 16px; border-radius: 6px; cursor: pointer;
            font-size: 10px; line-height: 1; padding: 0;
            display: flex; align-items: center; justify-content: center;
        }
        .block .b-moves button:hover { background: var(--g-line); }
        .block .b-moves button:disabled { opacity: 0.3; cursor: default; }

        /* 特殊積木：迴圈 / 條件 */
        .block.control-block {
            flex-direction: column; align-items: stretch; gap: 10px;
            background: linear-gradient(135deg, var(--info-bg), var(--info-border));
            border-color: var(--primary); box-shadow: 0 3px 0 var(--primary);
        }
        .block.control-block .cb-head { display: flex; align-items: center; gap: 10px; }
        .block.control-block .cb-inner {
            background: var(--surface); border: 2px dashed var(--info-border); border-radius: 12px;
            padding: 8px 12px; font-size: 15px; color: var(--ink-soft); font-weight: 600;
            display: flex; align-items: center; gap: 8px;
        }
        .block.cond-block {
            background: linear-gradient(135deg, var(--surface-2), var(--info-border));
            border-color: var(--accent); box-shadow: 0 3px 0 var(--accent);
        }

        /* 迴圈次數控制 */
        .loop-ctrl { display: flex; align-items: center; gap: 10px; }
        .loop-ctrl .lc-btn {
            border: none; background: var(--primary); color: #fff;
            width: 30px; height: 30px; border-radius: 10px; cursor: pointer;
            font-size: 20px; font-weight: 700; line-height: 1;
            display: flex; align-items: center; justify-content: center;
        }
        .loop-ctrl .lc-btn:hover { filter: brightness(1.08); }
        .loop-ctrl .lc-btn:disabled { opacity: 0.4; cursor: default; }
        .loop-ctrl .count-val {
            min-width: 40px; text-align: center;
            font-size: 22px; font-weight: 700; color: var(--info);
            background: var(--surface); border-radius: 10px; padding: 2px 8px;
        }
        .loop-ctrl .count-val.inf { color: var(--bad); }
        .loop-warn { font-size: 13px; color: var(--bad); font-weight: 600; margin-top: 2px; }

        /* 條件動作切換 */
        .action-toggle {
            border: none; border-radius: 10px; cursor: pointer;
            padding: 8px 14px; font-family: inherit; font-size: 15px; font-weight: 700;
            color: #fff; display: inline-flex; align-items: center; gap: 8px;
            transition: filter 0.12s ease;
        }
        .action-toggle:hover { filter: brightness(1.06); }
        .action-toggle:disabled { opacity: 0.5; cursor: default; }
        .action-toggle.heat   { background: linear-gradient(135deg, #ff7043, var(--warn)); }
        .action-toggle.freeze { background: linear-gradient(135deg, var(--primary), var(--info)); }
        .action-toggle .swap-hint { font-size: 11px; font-weight: 400; opacity: 0.85; }

        /* 執行狀態 */
        .block.active {
            border-color: var(--primary) !important;
            box-shadow: 0 0 0 3px var(--primary-shadow), 0 3px 0 var(--primary) !important;
            transform: scale(1.03);
        }
        .block.done { opacity: 0.8; border-color: var(--g2) !important; box-shadow: 0 3px 0 var(--g2) !important; }
        .block.done .b-num { background-color: var(--g1); }
        .block.buggy {
            border-color: var(--bad) !important;
            box-shadow: 0 0 0 3px rgba(229,57,53,0.35), 0 3px 0 var(--bad) !important;
            background: linear-gradient(135deg, var(--bad-bg), var(--bad-border)) !important;
            animation: block-shake 0.4s ease;
        }
        .block.buggy .b-num { background-color: var(--bad); }
        @keyframes block-shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }

        .block.locked.draggable { cursor: default; }
        .block.locked .b-moves, .block.locked .grip { visibility: hidden; }

        /* 指派積木（關卡一：變數對調） */
        .block.asn-block { gap: 8px; }
        .block.asn-block .var-sel {
            font-family: inherit; font-size: 14px; font-weight: 600;
            padding: 6px 18px 6px 8px; border: 2px solid var(--g-line); border-radius: 10px;
            background: var(--surface); color: var(--ink-soft); cursor: pointer; flex: 1; min-width: 0;
            appearance: none; -webkit-appearance: none;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="10" height="6" viewBox="0 0 10 6"><path d="M1 1l4 4 4-4" fill="none" stroke="%2393a0b4" stroke-width="1.8" stroke-linecap="round"/></svg>');
            background-repeat: no-repeat; background-position: right 6px center;
            text-overflow: ellipsis; white-space: nowrap;
        }
        .block.asn-block .var-sel:disabled { opacity: 0.7; cursor: default; }
        .block.asn-block .eq { font-size: 20px; font-weight: 700; color: var(--g1); }

        .toolbox {
            margin-top: 4px; padding: 12px;
            border: 2px dashed var(--muted-2); border-radius: 14px; background: var(--surface-2);
            display: flex; flex-direction: column; gap: 8px;
        }
        .toolbox .tb-label { font-size: 13px; font-weight: 700; color: var(--muted); }
        .toolbox .tb-item {
            border: none; border-radius: 12px; padding: 12px;
            font-family: inherit; font-size: 15px; font-weight: 700; cursor: pointer;
            background: linear-gradient(135deg, var(--g-bg), var(--g-line)); color: var(--ink-soft);
            box-shadow: 0 3px 0 var(--g-line); transition: filter 0.12s ease;
        }
        .toolbox .tb-item:hover:not(:disabled) { filter: brightness(1.05); }
        .toolbox .tb-item:disabled { opacity: 0.55; cursor: default; box-shadow: 0 3px 0 var(--border); }
        .toolbox .tb-item[data-added]::after { content: "　✓ 已放到指令最後一行"; font-weight: 400; font-size: 12px; color: var(--g1); }

        /* 變數狀態卡（右側工廠現場） */
        .vars-panel { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-bottom: 12px; }
        .var-card { flex: 1; min-width: 92px; background: var(--surface); border: 2px solid var(--border);
            border-radius: 14px; padding: 10px 8px; text-align: center; }
        .var-card.v-A { border-color: var(--accent-sky); background: var(--g-bg); }
        .var-card.v-B { border-color: var(--primary); background: var(--primary-tint); }
        .var-card.v-Temp { border-color: var(--info-border); background: var(--info-bg); }
        .var-card .vc-name { font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 4px; }
        .var-card .vc-jam { font-size: 15px; font-weight: 600; color: var(--ink-soft); }
        .var-card.flash { animation: flash-card 0.7s ease; }
        @keyframes flash-card { 0% { background: var(--g-line); transform: scale(1.06); } 100% { } }

        /* 巢狀判斷積木（關卡二：If-Else 優先順序） */
        .block.nest-block {
            align-items: center; gap: 10px;
            background: linear-gradient(135deg, var(--info-bg), var(--info-border));
            border-color: var(--accent); box-shadow: 0 3px 0 var(--accent);
        }
        .block.nest-block .nest-body { flex: 1; text-align: left; }
        .block.nest-block .nest-if { font-size: 15px; font-weight: 700; color: var(--ink); line-height: 1.4; }
        .block.nest-block .nest-if .kw { color: var(--info); }
        .block.nest-block .nest-if .cond { color: var(--g1); }
        .block.nest-block .nest-then { font-size: 14px; color: var(--ink-soft); margin-top: 3px; }
        .block.nest-block .nest-then .act { font-weight: 700; }
        .block.skipped {
            position: relative; opacity: 0.55; filter: grayscale(0.6);
            border-color: var(--muted-2) !important; box-shadow: 0 3px 0 var(--muted-2) !important;
            background: linear-gradient(135deg, var(--surface-2), var(--surface-2)) !important;
        }
        .block.skipped::after {
            content: "已跳過"; position: absolute; right: 12px; top: 8px;
            font-size: 11px; font-weight: 700; color: var(--muted);
        }

        /* 雙執行緒 / 死結（關卡三：Deadlock） */
        .thread {
            border: 2px dashed var(--border); border-radius: 16px;
            padding: 10px 12px; margin-bottom: 4px; background: var(--surface-2);
        }
        .thread .thread-head {
            display: flex; align-items: center; justify-content: space-between; gap: 8px;
            font-size: 14px; font-weight: 700; color: var(--muted); margin-bottom: 8px;
        }
        .thread .swap-lock-btn {
            flex-shrink: 0; border: none; background: linear-gradient(135deg, var(--primary), var(--info));
            color: #fff; border-radius: 10px; padding: 6px 10px;
            font-family: inherit; font-size: 12px; font-weight: 700; cursor: pointer;
        }
        .thread .swap-lock-btn:hover:not(:disabled) { filter: brightness(1.06); }
        .thread .swap-lock-btn:disabled { opacity: 0.4; cursor: default; }
        .thr-block {
            display: flex; align-items: center; gap: 8px;
            background: var(--surface); border: 2px solid var(--border); border-radius: 12px;
            padding: 8px 10px; margin-bottom: 6px;
            font-size: 14px; font-weight: 600; color: var(--muted);
        }
        .thr-block:last-child { margin-bottom: 0; }
        .thr-block .tb-i {
            width: 22px; height: 22px; flex-shrink: 0; border-radius: 50%;
            background: var(--muted-2); color: #fff; display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: 700;
        }
        .thr-block.done { opacity: 0.6; border-color: var(--g2); }
        .thr-block.done .tb-i { background: var(--g1); }
        .thr-block.current { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-shadow); }
        .thr-block.current .tb-i { background: var(--primary); }
        .thr-block.waiting { border-color: var(--g1); box-shadow: 0 0 0 3px rgba(255,167,38,0.22);
            color: var(--warn); animation: pulse-wait 1s ease-in-out infinite; }
        .thr-block.waiting .tb-i { background: var(--g1); }
        .thr-block.dead { border-color: var(--bad); box-shadow: 0 0 0 3px rgba(229,57,53,0.3);
            background: var(--bad-bg); color: var(--bad); animation: block-shake 0.4s ease infinite; }
        .thr-block.dead .tb-i { background: var(--bad); }
        @keyframes pulse-wait { 0%,100% { opacity: 1; } 50% { opacity: 0.55; } }

        /* ---------- 中：控制台 ---------- */
        .control-panel { align-items: center; text-align: center; }

        .console-screen {
            width: 100%; background-color: #2f2a3a; color: #d7fce4;
            border-radius: 16px; padding: 16px 18px;
            font-size: 15px; line-height: 1.55; min-height: 96px;
            margin-bottom: 18px; text-align: left;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.25);
        }
        .console-screen .console-line { display: flex; gap: 8px; }
        .console-screen .console-line::before { content: "›"; color: var(--g2); }
        .console-screen.err { color: #ffb4a8; }
        .console-screen.err .console-line::before { content: "✗"; color: #ff5252; }

        .ctrl-buttons { display: flex; flex-direction: column; gap: 12px; width: 100%; }
        .ctrl-btn {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            border: none; border-radius: 16px; padding: 15px;
            font-size: 18px; font-weight: 700; font-family: inherit; cursor: pointer; color: #fff;
            transition: transform 0.12s ease, filter 0.12s ease;
        }
        .ctrl-btn:hover:not(:disabled) { transform: translateY(-2px); filter: brightness(1.05); }
        .ctrl-btn:disabled { opacity: 0.45; cursor: default; }
        .ctrl-btn .btn-sub { font-size: 12px; font-weight: 400; opacity: 0.9; }
        .ctrl-btn.step { background: linear-gradient(135deg, var(--g2), var(--g2)); box-shadow: 0 4px 0 var(--g1); }
        .ctrl-btn.run  { background: linear-gradient(135deg, var(--g1), var(--g1)); }
        .ctrl-btn.reset { background: linear-gradient(135deg, var(--muted), var(--muted)); font-size: 15px; padding: 12px; }
        .ctrl-btn.magnify { background: linear-gradient(135deg, var(--accent), var(--accent)); font-size: 16px; }
        .ctrl-btn.hidden { display: none; }

        .step-tip { margin-top: 16px; font-size: 13px; color: var(--muted);
            background: var(--g-bg); border-radius: 12px; padding: 10px 14px; line-height: 1.5; }
        .step-tip b { color: var(--g1); }

        /* ---------- 右：工廠動畫區 ---------- */
        .factory-panel { align-items: center; }
        .speech {
            background: var(--surface); border: 3px solid var(--border); border-radius: 16px;
            padding: 12px 16px; font-size: 15px; color: var(--ink-soft); line-height: 1.5;
            margin-bottom: 14px; min-height: 52px; width: 100%; text-align: center;
            box-shadow: 0 4px 10px var(--shadow);
        }
        .speech.err  { border-color: #ffab91; color: var(--warn); background: var(--bad-bg); }
        .speech.good { border-color: #a5d6a7; color: var(--good); background: var(--good-bg); }

        .factory-stage {
            position: relative; width: 100%;
            background: linear-gradient(180deg, var(--info-bg) 0%, var(--info-border) 100%);
            border-radius: 20px; padding: 16px 16px 0; overflow: hidden;
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: flex-end; min-height: 300px;
        }
        .tower { display: flex; flex-direction: column-reverse; align-items: center; margin-bottom: 2px; }
        .tower .straw { font-size: 24px; margin-bottom: -8px; animation: drop-in 0.25s ease; }
        @keyframes drop-in { 0%{transform:translateY(-24px); opacity:0} 100%{transform:translateY(0); opacity:1} }
        .tower.topple { animation: topple 0.8s ease forwards; }
        @keyframes topple { 0%{transform:rotate(0)} 100%{transform:rotate(24deg) translate(40px,20px); opacity:0} }

        .product { font-size: 60px; line-height: 1; margin-bottom: 6px; min-height: 66px; transition: transform 0.2s ease; }
        .product.pop { animation: pop 0.4s ease; }
        @keyframes pop { 0%{transform:scale(0.4)} 60%{transform:scale(1.25)} 100%{transform:scale(1)} }

        .robot { font-size: 80px; line-height: 1; transition: transform 0.2s ease; filter: drop-shadow(0 6px 6px rgba(0,0,0,0.12)); }
        .robot.working { animation: robot-bounce 0.5s ease; }
        .robot.error   { animation: robot-shake 0.45s ease; }
        .robot.happy   { animation: robot-happy 0.6s ease; }
        .robot.panic   { animation: robot-panic 0.3s linear infinite; }
        @keyframes robot-bounce { 0%,100%{transform:translateY(0)} 40%{transform:translateY(-16px)} }
        @keyframes robot-shake { 0%,100%{transform:rotate(0)} 20%{transform:rotate(-9deg)} 60%{transform:rotate(9deg)} }
        @keyframes robot-happy { 0%,100%{transform:scale(1) rotate(0)} 30%{transform:scale(1.15) rotate(-6deg)} 60%{transform:scale(1.15) rotate(6deg)} }
        @keyframes robot-panic { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-4px)} 75%{transform:translateX(4px)} }

        .conveyor { width: 100%; height: 24px;
            background: repeating-linear-gradient(90deg, var(--muted) 0 18px, var(--muted) 18px 36px);
            border-radius: 6px 6px 0 0; margin-top: 4px; }

        /* 狀態 / 訂單區 */
        .status-area { margin-top: 16px; width: 100%; }
        .status-chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
        .chip { font-size: 13px; font-weight: 600; padding: 6px 12px; border-radius: 999px;
            background: var(--bg); color: var(--muted); display: flex; align-items: center; gap: 6px; transition: all 0.2s ease; }
        .chip.on { background: var(--g1); color: #fff; }
        .chip.on::before { content: "✓"; font-weight: 900; }
        .chip.off::before { content: "○"; }

        .order-ticket {
            background: var(--g-bg); border: 2px dashed var(--g-line); border-radius: 14px;
            padding: 14px 16px; font-size: 14px; color: var(--ink-soft); line-height: 1.6; text-align: left;
        }
        .order-ticket .ot-title { font-weight: 700; color: var(--g1); margin-bottom: 4px; }
        .order-ticket.hidden-order { text-align: center; color: var(--muted); border-color: var(--g-line); background: var(--surface-2); }
        .order-ticket b { color: var(--g1); }

        /* ---------- 彈窗 ---------- */
        .overlay { position: fixed; inset: 0; background: rgba(74,62,61,0.55);
            display: flex; align-items: center; justify-content: center; z-index: 50; padding: 20px; }
        .overlay.hidden { display: none; }
        .overlay-card { background: var(--surface); border: 8px solid var(--border); border-radius: 28px;
            padding: 36px 44px; text-align: center; max-width: 470px; box-shadow: 0 20px 45px rgba(0,0,0,0.2); }
        .overlay-card .o-icon { font-size: 60px; }
        .overlay-card h2 { font-size: 27px; color: var(--ink); margin: 10px 0 6px; }
        .overlay-card p { font-size: 16px; color: var(--muted); line-height: 1.6; margin: 0 0 24px; }
        .overlay-card p b { color: var(--g1); }

        .pill-btn { display: inline-flex; align-items: center; gap: 10px;
            background: linear-gradient(135deg, var(--primary), var(--accent)); color: #fff; border: none;
            border-radius: 999px; padding: 14px 30px; font-size: 17px; font-weight: 700;
            font-family: inherit; cursor: pointer; transition: transform 0.12s ease, filter 0.12s ease; }
        .pill-btn:hover { transform: translateY(-2px); filter: brightness(1.05); }
        .pill-btn.ghost { background: var(--bg); color: var(--ink-soft); }
        .overlay-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }

        /* ---------- 底部 ---------- */
        .card-footer { text-align: center; padding: 0 40px 30px; }
        .back-link { color: var(--muted); text-decoration: none; font-size: 15px; font-weight: 600; }
        .back-link:hover { color: var(--g1); }

        @media (max-width: 1000px) { .workspace { grid-template-columns: 1fr; } }

        /* ---------- 手機版 ---------- */
        @media (max-width: 700px) {
            body { padding: 16px 10px; }
            .debug-card { border-width: 6px; }
            .debug-header { padding: 26px 18px 22px; }
            .debug-header .header-icon { font-size: 42px; }
            .debug-header h1 { font-size: 26px; }
            .debug-header p { font-size: 14px; }
            .mission-bar { flex-direction: column; align-items: flex-start; gap: 10px; padding: 14px 18px; }
            .workspace { padding: 16px 14px 22px; gap: 14px; }
            .ctrl-btn { font-size: 16px; padding: 13px; }
            .factory-stage { min-height: 240px; }
            .robot { font-size: 64px; }
            .product { font-size: 48px; min-height: 54px; }
            .overlay-card { padding: 26px 22px; }
            .overlay-card h2 { font-size: 22px; }
            .card-footer { padding: 0 20px 24px; }
        }
    </style>
</head>
<body>

    <div class="debug-card">
        <div class="debug-header">
            <div class="header-icon">🍰🐛</div>
            <h1>代碼麵包工廠</h1>
            <p>Bug 精靈鑽進了機器人的大腦，把指令搞壞了！<br>當一位「工程師偵探」，用<b>單步執行</b>找出每一種 Bug，拯救工廠吧！</p>
        </div>

        <div class="mission-bar">
            <span id="level-badge" class="level-badge">關卡 1</span>
            <span class="mission-text" id="mission-text"></span>
        </div>

        <div class="workspace">
            <!-- 左：程式指令區 -->
            <div class="panel">
                <h3 class="panel-title"><i class="fa-solid fa-cubes" style="color:var(--g1)"></i> 機器人大腦指令</h3>
                <p class="panel-hint" id="left-hint"></p>
                <div id="block-list" class="block-list"></div>
            </div>

            <!-- 中：控制台 -->
            <div class="panel control-panel">
                <h3 class="panel-title"><i class="fa-solid fa-terminal" style="color:var(--g1)"></i> 偵錯控制台</h3>
                <p class="panel-hint">「單步執行」是除錯的關鍵——一步一步看，才知道錯在哪！</p>

                <div id="console" class="console-screen">
                    <div class="console-line">準備就緒，等待指令…</div>
                </div>

                <div class="ctrl-buttons">
                    <button id="btn-step" class="ctrl-btn step" onclick="stepOnce()">
                        <span>👣 單步執行</span><span class="btn-sub">Step</span>
                    </button>
                    <button id="btn-run" class="ctrl-btn run" onclick="runAll()">
                        <span>▶ 執行全部</span><span class="btn-sub">Run</span>
                    </button>
                    <button id="btn-reset" class="ctrl-btn reset" onclick="resetRun()">
                        <i class="fa-solid fa-rotate-left"></i> 重來一次
                    </button>
                </div>

                <div class="step-tip" id="step-tip"></div>
            </div>

            <!-- 右：工廠動畫區 -->
            <div class="panel factory-panel">
                <h3 class="panel-title"><i class="fa-solid fa-industry" style="color:var(--g1)"></i> 工廠現場</h3>
                <div id="speech" class="speech"></div>
                <div class="factory-stage">
                    <div id="tower" class="tower"></div>
                    <div id="product" class="product">🍽️</div>
                    <div id="robot" class="robot">🤖</div>
                    <div class="conveyor"></div>
                </div>
                <div class="status-area" id="status-area"></div>
            </div>
        </div>

        <div class="card-footer">
            <a href="../index.html" class="back-link"><i class="fa-solid fa-chevron-left"></i> 回到學習主頁</a>
        </div>
    </div>

    <!-- 彈窗 -->
    <div id="overlay" class="overlay hidden">
        <div class="overlay-card">
            <div class="o-icon" id="o-icon">🎉</div>
            <h2 id="o-title"></h2>
            <p id="o-text"></p>
            <div class="overlay-actions" id="o-actions"></div>
        </div>
    </div>

    <script src="../assets/js/debug.js"></script>
    <script src="../assets/js/theme.js"></script>

</body>
</html>
