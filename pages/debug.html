<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>代碼麵包工廠 · Debug 除錯大冒險</title>
    <link rel="icon" type="image/png" href="../assets/images/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/theme.css">
    <link rel="stylesheet" href="../assets/css/debug.css">
</head>
<body>

    <div class="debug-card">
        <div class="debug-header">
            <div class="header-icon">🍰🐛</div>
            <h1>代碼麵包工廠</h1>
            <p>Bug 精靈鑽進了機器人的大腦，把指令搞壞了！<br>當一位「工程師偵探」，用<b>單步執行</b>找出每一種 Bug，拯救工廠吧！</p>
        </div>

        <div class="mission-bar">
            <span id="level-badge" class="level-badge">關卡 1</span>
            <span class="mission-text" id="mission-text"></span>
        </div>

        <div class="workspace">
            <!-- 左：程式指令區 -->
            <div class="panel">
                <h3 class="panel-title"><i class="fa-solid fa-cubes" style="color:var(--g1)"></i> 機器人大腦指令</h3>
                <p class="panel-hint" id="left-hint"></p>
                <div id="block-list" class="block-list"></div>
            </div>

            <!-- 中：控制台 -->
            <div class="panel control-panel">
                <h3 class="panel-title"><i class="fa-solid fa-terminal" style="color:var(--g1)"></i> 偵錯控制台</h3>
                <p class="panel-hint">「單步執行」是除錯的關鍵——一步一步看，才知道錯在哪！</p>

                <div id="console" class="console-screen">
                    <div class="console-line">準備就緒，等待指令…</div>
                </div>

                <div class="ctrl-buttons">
                    <button id="btn-step" class="ctrl-btn step" onclick="stepOnce()">
                        <span>👣 單步執行</span><span class="btn-sub">Step</span>
                    </button>
                    <button id="btn-run" class="ctrl-btn run" onclick="runAll()">
                        <span>▶ 執行全部</span><span class="btn-sub">Run</span>
                    </button>
                    <button id="btn-reset" class="ctrl-btn reset" onclick="resetRun()">
                        <i class="fa-solid fa-rotate-left"></i> 重來一次
                    </button>
                </div>

                <div class="step-tip" id="step-tip"></div>
            </div>

            <!-- 右：工廠動畫區 -->
            <div class="panel factory-panel">
                <h3 class="panel-title"><i class="fa-solid fa-industry" style="color:var(--g1)"></i> 工廠現場</h3>
                <div id="speech" class="speech"></div>
                <div class="factory-stage">
                    <div id="tower" class="tower"></div>
                    <div id="product" class="product">🍽️</div>
                    <div id="robot" class="robot">🤖</div>
                    <div class="conveyor"></div>
                </div>
                <div class="status-area" id="status-area"></div>
            </div>
        </div>

        <div class="card-footer">
            <a href="../index.html" class="back-link"><i class="fa-solid fa-chevron-left"></i> 回到學習主頁</a>
        </div>
    </div>

    <!-- 彈窗 -->
    <div id="overlay" class="overlay hidden">
        <div class="overlay-card">
            <div class="o-icon" id="o-icon">🎉</div>
            <h2 id="o-title"></h2>
            <p id="o-text"></p>
            <div class="overlay-actions" id="o-actions"></div>
        </div>
    </div>

    <script src="../assets/js/debug.js"></script>
    <script src="../assets/js/theme.js"></script>

</body>
</html>
