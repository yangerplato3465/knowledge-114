<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>快問快答 · 是非題挑戰</title>
    <link rel="icon" type="image/png" href="../assets/images/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/theme.css">
    <link rel="stylesheet" href="../assets/css/quick-quiz.css">
</head>
<body>

    <div class="quiz-card">
        <div class="quiz-header">
            <div class="header-icon">⚡</div>
            <h1>快問快答</h1>
        </div>

        <!-- 開始設定畫面 -->
        <div id="start-screen" class="start-screen">
            <div class="start-icon">⏱️</div>
            <h2>設定遊戲方式</h2>
            <p class="start-sub">依照孩子的年齡調整每題秒數與題目數量</p>

            <div class="settings-row">
                <div class="setting-group">
                    <p class="group-title"><i class="fa-solid fa-stopwatch"></i> 每題作答時間</p>

                    <div class="time-field">
                        <label for="time-input">每題</label>
                        <input id="time-input" type="number" min="1" max="60" step="1" value="3">
                        <span class="unit">秒</span>
                    </div>

                    <div class="quick-picks">
                        <button class="pick-btn" onclick="setTime(3)">3 秒</button>
                        <button class="pick-btn" onclick="setTime(5)">5 秒</button>
                        <button class="pick-btn" onclick="setTime(8)">8 秒</button>
                        <button class="pick-btn" onclick="setTime(10)">10 秒</button>
                    </div>

                    <p class="start-hint">可輸入 1～60 秒</p>
                </div>

                <div class="setting-group">
                    <p class="group-title"><i class="fa-solid fa-list-ol"></i> 題目數量</p>

                    <div class="time-field">
                        <label for="count-input">共</label>
                        <input id="count-input" type="number" min="1" step="1" value="10">
                        <span class="unit">題</span>
                    </div>

                    <div class="quick-picks">
                        <button class="pick-btn" onclick="setCount(5)">5 題</button>
                        <button class="pick-btn" onclick="setCount(10)">10 題</button>
                        <button class="pick-btn" onclick="setCount(20)">20 題</button>
                        <button class="pick-btn" onclick="setCount(30)">30 題</button>
                    </div>

                    <p id="count-hint" class="start-hint">每次會從題庫隨機抽出題目</p>
                </div>
            </div>

            <div class="footer-actions">
                <button class="pill-btn" onclick="startGame()">
                    開始挑戰 <i class="fa-solid fa-play"></i>
                </button>
            </div>
            <a href="../index.html" class="back-link"><i class="fa-solid fa-chevron-left"></i> 回到學習主頁</a>
        </div>

        <!-- 答題畫面 -->
        <div id="quiz-screen" class="hidden">
            <div class="progress-wrap">
                <div class="progress-meta">
                    <button class="setup-btn" onclick="backToSetup()">
                        <i class="fa-solid fa-gear"></i> 回到設定
                    </button>
                    <span id="progress-label">第 1 題 / 共 6 題</span>
                </div>
                <div class="progress-track">
                    <div id="progress-fill" class="progress-fill"></div>
                </div>
            </div>

            <div class="quiz-body">
                <h2 id="question-text" class="question-text"></h2>

                <div class="stage">
                    <div id="timer-ring" class="timer-ring">
                        <svg width="96" height="96" viewBox="0 0 96 96">
                            <circle class="ring-bg" cx="48" cy="48" r="42"></circle>
                            <circle id="ring-fg" class="ring-fg" cx="48" cy="48" r="42"></circle>
                        </svg>
                        <div id="ring-num" class="ring-num">3</div>
                    </div>

                    <div id="answer-reveal" class="answer-reveal hidden">
                        <div id="answer-badge" class="answer-badge">
                            <span class="badge-icon"><i id="badge-icon" class="fa-solid fa-circle-check"></i></span>
                            <span id="answer-word">對</span>
                        </div>
                        <div class="answer-caption">正確答案</div>
                    </div>
                </div>

                <div class="footer-actions">
                    <button id="next-btn" class="pill-btn hidden" onclick="nextQuestion()">
                        下一題 <i class="fa-solid fa-arrow-right"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- 結果畫面 -->
        <div id="result-screen" class="result-screen hidden">
            <div class="result-icon">🎉</div>
            <h2>全部完成！</h2>
            <p class="result-sub">6 題都答完囉，做得好！</p>
            <button class="pill-btn" onclick="restartQuiz()">
                <i class="fa-solid fa-rotate-left"></i> 再玩一次
            </button>
            <br>
            <a href="../index.html" class="back-link"><i class="fa-solid fa-chevron-left"></i> 回到學習主頁</a>
        </div>
    </div>

    <script src="../assets/js/quick-quiz.js"></script>
    <script src="../assets/js/theme.js"></script>
</body>
</html>
