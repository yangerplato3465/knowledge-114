<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>數學勇者 · RPG 闖關問答</title>
    <link rel="icon" type="image/png" href="../assets/images/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/theme.css">
    <style>
        * { box-sizing: border-box; }

        /* 本頁主題色：縹色（深天藍，不帶紫） */
        body { --g1: #3f6fb0; --g2: #7ba6d8; }

        body {
            background-color: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
            font-family: 'Fredoka', 'Noto Sans TC', sans-serif;
        }

        .game-card {
            background-color: var(--surface);
            border: 8px solid var(--border);
            border-radius: 32px;
            box-shadow: 0 15px 35px var(--shadow);
            width: 860px;
            max-width: 100%;
            overflow: hidden;
            position: relative;
        }

        /* ---------- 頂部標題 ---------- */
        .game-header {
            background: linear-gradient(135deg, var(--g1) 0%, var(--g2) 100%);
            color: #ffffff;
            text-align: center;
            padding: 40px 40px 34px;
        }

        .game-header .header-icon { font-size: 52px; margin-bottom: 10px; }

        .game-header h1 {
            font-size: 38px;
            font-weight: 700;
            margin: 0;
            text-shadow: 1px 2px 0 rgba(0, 0, 0, 0.08);
        }

        .game-header p {
            font-size: 18px;
            margin: 8px 0 0;
            opacity: 0.95;
            font-weight: 400;
        }

        /* ---------- 敵人關卡地圖 (Slay the Spire 風格) ---------- */
        .enemy-map {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 30px 56px 6px;
        }

        .map-node {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
            border: 3px solid var(--border);
            background-color: var(--surface);
            color: var(--muted-2);
            transition: all 0.3s ease;
        }

        .map-line {
            flex: 1;
            height: 4px;
            border-radius: 999px;
            background-color: var(--border);
            min-width: 16px;
            transition: background-color 0.3s ease;
        }

        .map-line.done { background-color: var(--accent); }

        .map-node.done {
            border-color: var(--accent);
            background-color: var(--surface-2);
            color: var(--accent);
            opacity: 0.85;
        }

        .map-node.current {
            border-color: var(--g1);
            background-color: var(--warn-bg);
            color: var(--g1);
            transform: scale(1.25);
            animation: nodePulse 1.2s infinite;
        }

        @keyframes nodePulse {
            0%, 100% { box-shadow: 0 4px 12px rgba(255, 138, 101, 0.3); }
            50% { box-shadow: 0 4px 20px rgba(255, 138, 101, 0.55); }
        }

        /* 最後一關：魔王節點，更大、紅金配色、頭頂皇冠 */
        .map-node.boss {
            width: 60px;
            height: 60px;
            font-size: 26px;
            border-width: 4px;
            border-color: var(--bad);
            background-color: var(--bad-bg);
            color: var(--bad);
            position: relative;
        }

        .map-node.boss.current {
            transform: scale(1.18);
            animation: bossPulse 1.1s infinite;
        }

        .map-node.boss .boss-crown {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 18px;
        }

        @keyframes bossPulse {
            0%, 100% { box-shadow: 0 4px 14px rgba(198, 40, 40, 0.35); }
            50% { box-shadow: 0 4px 22px rgba(198, 40, 40, 0.6); }
        }

        /* ---------- 攻擊時整個畫面輕微震動 ---------- */
        @keyframes screenShake {
            0%, 100% { transform: translate(0, 0); }
            20% { transform: translate(-5px, 3px); }
            40% { transform: translate(5px, -3px); }
            60% { transform: translate(-4px, 2px); }
            80% { transform: translate(4px, -2px); }
        }

        .game-card.shake { animation: screenShake 0.4s ease; }

        /* ---------- 勝利後的三選一強化面板 ---------- */
        .upgrade-overlay {
            position: absolute;
            inset: 0;
            background: rgba(74, 62, 61, 0.55);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            z-index: 50;
        }

        .upgrade-panel {
            background-color: var(--surface);
            border: 6px solid var(--border);
            border-radius: 28px;
            padding: 34px 32px;
            text-align: center;
            width: 100%;
            max-width: 720px;
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.2);
            animation: panelPop 0.3s ease;
        }

        @keyframes panelPop {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .upgrade-panel h2 {
            font-size: 28px;
            font-weight: 700;
            color: var(--ink);
            margin: 0 0 6px;
        }

        .upgrade-panel .panel-sub {
            font-size: 16px;
            color: var(--muted);
            margin: 0 0 26px;
        }

        .upgrade-options { display: flex; gap: 16px; }

        .upgrade-card {
            flex: 1;
            background-color: var(--surface);
            border: 3px solid var(--border);
            border-radius: 20px;
            padding: 26px 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Fredoka', 'Noto Sans TC', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 12px var(--shadow);
        }

        .upgrade-card:hover {
            border-color: var(--g1);
            transform: translateY(-4px);
            box-shadow: 0 10px 22px rgba(255, 138, 101, 0.18);
        }

        .upgrade-card .up-icon { font-size: 40px; line-height: 1; }
        .upgrade-card .up-title { font-size: 19px; font-weight: 700; color: var(--ink); }
        .upgrade-card .up-desc { font-size: 14px; color: var(--ink-soft); line-height: 1.45; }

        .howto-text {
            text-align: left;
            font-size: 16px;
            color: var(--ink-soft);
            line-height: 1.7;
            margin: 6px auto 26px;
            max-width: 460px;
            padding-left: 4px;
            list-style: none;
        }
        .howto-text li { margin-bottom: 10px; }
        .howto-text strong { color: var(--ink); }

        /* ---------- 開始前的選單畫面 ---------- */
        .setup-screen {
            padding: 44px 56px 56px;
            text-align: center;
        }

        .setup-title {
            font-size: 28px;
            font-weight: 700;
            color: var(--ink);
            margin: 0 0 8px;
        }

        .setup-sub {
            font-size: 16px;
            color: var(--muted);
            margin: 0 0 30px;
        }

        .choice-grid { display: flex; gap: 20px; }

        .choice-card {
            flex: 1;
            background-color: var(--surface);
            border: 3px solid var(--border);
            border-radius: 24px;
            padding: 44px 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Fredoka', 'Noto Sans TC', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            box-shadow: 0 4px 12px var(--shadow);
        }

        .choice-card:hover {
            border-color: var(--g1);
            transform: translateY(-4px);
            box-shadow: 0 10px 22px rgba(255, 138, 101, 0.18);
        }

        .choice-card .choice-emoji {
            font-size: 52px;
            line-height: 1;
            font-weight: 700;
            color: var(--g1);
            width: 84px;
            height: 84px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--warn-bg);
            border: 3px solid var(--warn-border);
            border-radius: 50%;
        }
        .choice-card .choice-label { font-size: 24px; font-weight: 700; color: var(--ink); }

        .pool-list { display: flex; flex-direction: column; gap: 14px; }

        .pool-card {
            display: flex;
            align-items: center;
            gap: 18px;
            background-color: var(--surface);
            border: 3px solid var(--border);
            border-radius: 18px;
            padding: 18px 24px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Fredoka', 'Noto Sans TC', sans-serif;
            text-align: left;
            box-shadow: 0 4px 12px var(--shadow);
        }

        .pool-card:hover {
            border-color: var(--g1);
            transform: translateY(-3px);
            box-shadow: 0 8px 18px rgba(255, 138, 101, 0.15);
        }

        .pool-card .pool-num {
            flex-shrink: 0;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background-color: var(--warn-bg);
            border: 2px solid var(--warn-border);
            color: var(--g1);
            font-weight: 700;
            font-size: 17px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .pool-card .pool-name { font-size: 19px; font-weight: 600; color: var(--ink); flex: 1; }
        .pool-card .pool-arrow { color: var(--muted-2); font-size: 16px; }

        .back-link-btn {
            margin-top: 26px;
            background: none;
            border: none;
            color: var(--muted);
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            font-family: 'Fredoka', 'Noto Sans TC', sans-serif;
        }
        .back-link-btn:hover { color: var(--g1); }

        /* ---------- 戰鬥場景 ---------- */
        .battle-stage {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            gap: 24px;
            padding: 14px 56px 12px;
        }

        .fighter { width: 46%; text-align: center; }

        .fighter .avatar {
            font-size: 84px;
            line-height: 1;
            display: inline-block;
            transition: transform 0.15s ease;
        }

        .fighter .name {
            font-size: 18px;
            font-weight: 700;
            color: var(--ink);
            margin: 8px 0 6px;
        }

        .hp-row {
            display: flex;
            align-items: center;
            gap: 8px;
            justify-content: center;
            font-size: 14px;
            font-weight: 600;
            color: var(--muted);
            margin-bottom: 6px;
        }

        .hp-track {
            background-color: var(--border);
            border-radius: 999px;
            height: 16px;
            overflow: hidden;
            border: 2px solid var(--border);
        }

        .hp-fill {
            height: 100%;
            width: 100%;
            border-radius: 999px;
            transition: width 0.5s ease, background-color 0.5s ease;
        }

        .hp-fill.player { background: linear-gradient(90deg, #66bb6a, var(--good)); }
        .hp-fill.enemy  { background: linear-gradient(90deg, #ef5350, var(--bad)); }

        .vs-badge {
            font-size: 26px;
            font-weight: 700;
            color: var(--muted-2);
            padding-bottom: 40px;
        }

        /* 受擊與攻擊動畫 */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px) rotate(-4deg); }
            75% { transform: translateX(8px) rotate(4deg); }
        }
        @keyframes bump {
            0%, 100% { transform: translateY(0); }
            40% { transform: translateY(-14px) scale(1.08); }
        }
        .hit { animation: shake 0.4s ease; }
        .attack { animation: bump 0.4s ease; }

        .floating-dmg {
            position: absolute;
            font-size: 52px;
            font-weight: 700;
            pointer-events: none;
            z-index: 60;
            text-shadow:
                -2px -2px 0 #fff, 2px -2px 0 #fff,
                -2px  2px 0 #fff, 2px  2px 0 #fff,
                0 4px 10px rgba(0, 0, 0, 0.25);
            animation: floatUp 1.6s cubic-bezier(0.2, 0.8, 0.3, 1) forwards;
        }
        @keyframes floatUp {
            0%   { opacity: 0; transform: translateY(0) scale(0.4); }
            18%  { opacity: 1; transform: translateY(-18px) scale(1.35); }
            32%  { transform: translateY(-26px) scale(1); }
            70%  { opacity: 1; transform: translateY(-46px) scale(1); }
            100% { opacity: 0; transform: translateY(-90px) scale(0.95); }
        }

        /* ---------- 題目區 ---------- */
        .quiz-body { padding: 16px 56px 48px; }

        .round-label {
            text-align: center;
            font-size: 15px;
            font-weight: 600;
            color: var(--muted);
            margin-bottom: 12px;
        }

        /* ---------- 計時器 ---------- */
        .timer-wrap {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .timer-text {
            font-size: 22px;
            font-weight: 700;
            color: var(--accent);
            min-width: 54px;
            text-align: right;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .timer-track {
            flex: 1;
            background-color: var(--border);
            border-radius: 999px;
            height: 14px;
            overflow: hidden;
            border: 2px solid var(--border);
        }

        .timer-fill {
            height: 100%;
            width: 100%;
            border-radius: 999px;
            background: linear-gradient(90deg, var(--accent), var(--primary));
            transition: width 1s linear, background 0.3s ease;
        }

        .timer-fill.low { background: linear-gradient(90deg, #ef5350, var(--g1)); }
        .timer-text.low { color: var(--bad); animation: pulse 0.6s infinite; }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.12); }
        }

        .question-box {
            background-color: var(--surface-2);
            border: 3px dashed var(--primary);
            border-radius: 20px;
            text-align: center;
            padding: 24px;
            margin-bottom: 24px;
        }

        .question-box .q-text {
            font-size: 36px;
            font-weight: 700;
            color: var(--ink);
            margin: 0;
            letter-spacing: 1px;
        }

        .option-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .option-btn {
            background-color: var(--surface);
            border: 3px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            font-size: 24px;
            font-weight: 600;
            color: var(--ink-soft);
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Fredoka', 'Noto Sans TC', sans-serif;
            box-shadow: 0 4px 12px var(--shadow);
        }

        .option-btn:hover:not(:disabled) {
            border-color: var(--g1);
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(255, 138, 101, 0.18);
        }

        .option-btn:disabled { cursor: default; }
        .option-btn.correct { border-color: #66bb6a; background-color: var(--good-bg); color: var(--good); }
        .option-btn.wrong   { border-color: #ef9a9a; background-color: var(--bad-bg); color: var(--bad); }

        .feedback-msg {
            font-size: 20px;
            font-weight: 700;
            text-align: center;
            margin: 24px 0 0;
            min-height: 28px;
        }
        .feedback-msg.good { color: var(--good); }
        .feedback-msg.bad { color: var(--bad); }

        .footer-actions { display: flex; justify-content: center; margin-top: 20px; }

        .pill-btn {
            background: linear-gradient(135deg, var(--g1) 0%, var(--g2) 100%);
            color: #ffffff;
            border: none;
            border-radius: 999px;
            padding: 16px 44px;
            font-size: 20px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Fredoka', 'Noto Sans TC', sans-serif;
            box-shadow: 0 6px 16px rgba(255, 138, 101, 0.25);
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        .pill-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 24px rgba(255, 138, 101, 0.3); }

        .hidden { display: none; }

        /* ---------- 結束畫面 ---------- */
        .end-screen { text-align: center; padding: 56px; }
        .end-screen .end-icon { font-size: 76px; }
        .end-screen h2 { font-size: 34px; font-weight: 700; color: var(--ink); margin: 16px 0 10px; }
        .end-screen p { font-size: 20px; color: var(--ink-soft); margin: 0 0 26px; }

        .back-link {
            display: inline-block;
            margin-top: 22px;
            font-size: 16px;
            color: var(--muted);
            text-decoration: none;
            font-weight: 500;
        }
        .back-link:hover { color: var(--g1); }

        /* ---------- 手機版 ---------- */
        @media (max-width: 600px) {
            body { padding: 20px 10px; }
            .game-card { border-width: 6px; }
            .game-header { padding: 30px 20px 26px; }
            .game-header .header-icon { font-size: 42px; }
            .game-header h1 { font-size: 28px; }
            .game-header p { font-size: 15px; }

            .enemy-map { padding: 22px 18px 4px; gap: 4px; }
            .map-node { width: 34px; height: 34px; font-size: 15px; border-width: 2px; }
            .map-node.boss { width: 46px; height: 46px; font-size: 20px; border-width: 3px; }
            .map-node.boss .boss-crown { top: -16px; font-size: 14px; }

            .setup-screen { padding: 30px 20px 40px; }
            .setup-title { font-size: 22px; }
            .choice-grid { gap: 12px; }
            .choice-card { padding: 26px 12px; }
            .choice-card .choice-emoji { width: 64px; height: 64px; font-size: 38px; }
            .choice-card .choice-label { font-size: 19px; }
            .pool-card { gap: 12px; padding: 14px 16px; }
            .pool-card .pool-name { font-size: 16px; }

            .battle-stage { padding: 12px 16px 8px; gap: 12px; }
            .fighter .avatar { font-size: 56px; }
            .fighter .name { font-size: 15px; }
            .hp-row { font-size: 12px; }
            .vs-badge { font-size: 18px; padding-bottom: 28px; }
            .floating-dmg { font-size: 38px; }

            .quiz-body { padding: 12px 18px 32px; }
            .timer-text { font-size: 18px; min-width: 44px; }
            .question-box { padding: 16px; margin-bottom: 16px; }
            .question-box .q-text { font-size: 26px; }
            .option-grid { gap: 10px; }
            .option-btn { padding: 14px; font-size: 19px; }
            .feedback-msg { font-size: 17px; }
            .pill-btn { padding: 14px 36px; font-size: 18px; }

            /* 強化卡片改為「圖示在左、說明在右」的橫向排列，直向堆疊 */
            .upgrade-overlay { padding: 14px; overflow-y: auto; }
            .upgrade-panel { padding: 22px 18px; }
            .upgrade-panel h2 { font-size: 22px; }
            .upgrade-panel .panel-sub { margin-bottom: 18px; }
            .upgrade-options { flex-direction: column; gap: 10px; }
            .upgrade-card {
                display: grid;
                grid-template-columns: auto 1fr;
                column-gap: 14px;
                row-gap: 2px;
                align-items: center;
                text-align: left;
                padding: 12px 14px;
            }
            .upgrade-card .up-icon { grid-row: 1 / 3; font-size: 30px; }
            .upgrade-card .up-title { font-size: 16px; }
            .upgrade-card .up-desc { font-size: 13px; }

            .end-screen { padding: 40px 20px; }
            .end-screen h2 { font-size: 27px; }
            .end-screen p { font-size: 17px; }
        }
    </style>
</head>
<body>

    <div class="game-card">
        <div class="game-header">
            <div class="header-icon">⚔️</div>
            <h1>數學勇者</h1>
            <p>用算術打倒怪獸吧！答對攻擊，答錯受傷</p>
        </div>

        <!-- 選年級 -->
        <div id="grade-screen" class="setup-screen">
            <h2 class="setup-title">選擇年級</h2>
            <p class="setup-sub">先選擇你的年級，再挑選想練習的題庫</p>
            <div class="choice-grid">
                <button class="choice-card" onclick="selectGrade('五年級')">
                    <span class="choice-emoji">五</span>
                    <span class="choice-label">五年級</span>
                </button>
                <button class="choice-card" onclick="selectGrade('六年級')">
                    <span class="choice-emoji">六</span>
                    <span class="choice-label">六年級</span>
                </button>
            </div>
        </div>

        <!-- 選題庫 -->
        <div id="pool-screen" class="setup-screen hidden">
            <h2 class="setup-title">選擇題庫</h2>
            <p id="pool-sub" class="setup-sub"></p>
            <div id="pool-list" class="pool-list"></div>
            <button class="back-link-btn" onclick="backToGrade()"><i class="fa-solid fa-chevron-left"></i> 重新選擇年級</button>
        </div>

        <!-- 戰鬥畫面 -->
        <div id="battle-screen" class="hidden">
            <div id="enemy-map" class="enemy-map"></div>
            <div class="battle-stage">
                <div class="fighter">
                    <span id="player-avatar" class="avatar">🧙</span>
                    <div class="name">勇者</div>
                    <div class="hp-row"><i class="fa-solid fa-heart" style="color:#66bb6a;"></i> <span id="player-hp-text">100 / 100</span></div>
                    <div class="hp-track"><div id="player-hp" class="hp-fill player"></div></div>
                </div>

                <div class="vs-badge">VS</div>

                <div class="fighter">
                    <span id="enemy-avatar" class="avatar">👾</span>
                    <div id="enemy-name" class="name">史萊姆怪</div>
                    <div class="hp-row"><i class="fa-solid fa-heart" style="color:#ef5350;"></i> <span id="enemy-hp-text">100 / 100</span></div>
                    <div class="hp-track"><div id="enemy-hp" class="hp-fill enemy"></div></div>
                </div>
            </div>

            <div class="quiz-body">
                <div id="round-label" class="round-label"></div>
                <div class="timer-wrap">
                    <div class="timer-track"><div id="timer-fill" class="timer-fill"></div></div>
                    <div id="timer-text" class="timer-text"><i class="fa-solid fa-stopwatch"></i> <span id="timer-secs">30</span>s</div>
                </div>
                <div class="question-box">
                    <p id="question-text" class="q-text"></p>
                </div>
                <div id="option-grid" class="option-grid"></div>
                <div id="feedback-msg" class="feedback-msg"></div>
                <div class="footer-actions">
                    <button id="next-btn" class="pill-btn hidden" onclick="nextRound()">
                        繼續 <i class="fa-solid fa-arrow-right"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- 結束畫面 -->
        <div id="end-screen" class="end-screen hidden">
            <div id="end-icon" class="end-icon">🏆</div>
            <h2 id="end-title"></h2>
            <p id="end-text"></p>
            <button class="pill-btn" onclick="restartGame()">
                <i class="fa-solid fa-rotate-left"></i> 再玩一次
            </button>
            <br>
            <a href="../index.html" class="back-link"><i class="fa-solid fa-chevron-left"></i> 回到學習主頁</a>
        </div>

        <!-- 玩法說明 -->
        <div id="howto-overlay" class="upgrade-overlay hidden">
            <div class="upgrade-panel">
                <h2>🎮 遊戲玩法</h2>
                <p class="panel-sub" id="howto-pool-label"></p>
                <ul class="howto-text">
                    <li>⚔️ <strong>答對題目</strong>：攻擊怪獸，扣牠的血量。</li>
                    <li>💥 <strong>答錯或時間到</strong>：換你被攻擊，扣自己的血量。</li>
                    <li>⏱️ 每題有 <strong>30 秒</strong>作答時間，要把握喔！</li>
                    <li>⭐ 打倒怪獸後可<strong>三選一</strong>強化能力。</li>
                    <li>👑 一路打倒所有怪獸，擊敗最後的<strong>魔王</strong>就獲勝！</li>
                </ul>
                <button class="pill-btn" onclick="startGame()">開始遊戲 <i class="fa-solid fa-play"></i></button>
            </div>
        </div>

        <!-- 三選一強化面板 -->
        <div id="upgrade-overlay" class="upgrade-overlay hidden">
            <div class="upgrade-panel">
                <h2>⭐ 選擇一項強化</h2>
                <p class="panel-sub">打倒敵人！挑選一個能力提升，再迎戰下一隻怪獸</p>
                <div id="upgrade-options" class="upgrade-options"></div>
            </div>
        </div>
    </div>

    <audio id="bg-music" src="../assets/audio/music.mp3" loop preload="auto"></audio>

    <script src="../assets/js/math-rpg-pools.js"></script>
    <script src="../assets/js/math-rpg.js"></script>
    <script src="../assets/js/theme.js"></script>
</body>
</html>
